<!-- Label jour/nuit — mis à jour par meteo.ts (Membre 5) -->
<p id="modeLabel" class="mode-label"></p>

<button id="btn-mute" class="btn">Son : ON</button>

     ÉCRAN D'ACCUEIL — affiché au démarrage
     =================================================== -->

     =================================================== -->
<div id="ecran-gameover" class="ecran" style="display: none;">
  <h2>Game Over</h2>
  <p id="score-final">Score : 0</p>
  <p id="meilleur-score-affichage">Meilleur : 0</p>

  </p>
</div>
